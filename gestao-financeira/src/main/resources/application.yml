# ============================================================
# CONFIGURAÇÃO DA APLICAÇÃO
# Este arquivo pertence à camada de INFRASTRUCTURE.
# Ele configura o framework (Spring Boot), não o domínio.
# ============================================================

spring:
  application:
    name: gestao-financeira

  # ============================================================
  # BANCO DE DADOS - PostgreSQL
  # Conecta ao banco local. Você precisa ter o PostgreSQL
  # rodando com um banco chamado "gestao_financeira".
  # ============================================================
  datasource:
    url: jdbc:postgresql://localhost:5433/gestao_financeira
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ============================================================
  # JPA / HIBERNATE
  # ddl-auto: update → cria/atualiza tabelas automaticamente
  #   (em produção usar "none" + Flyway/Liquibase)
  # show-sql: true → mostra as queries no console (debug)
  # ============================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# SERVIDOR
# Roda na porta 8080 (padrão)
# ============================================================
server:
  port: 8080

# ============================================================
# JWT — JSON Web Token
# ============================================================
# secret: chave Base64 de 256 bits para assinar tokens HMAC-SHA256.
#   IMPORTANTE: em produção, use variável de ambiente:
#   JWT_SECRET=${JWT_SECRET} no lugar do valor hardcoded.
#
# expiration: tempo de validade do token em milissegundos.
#   86400000 = 24 horas (24 * 60 * 60 * 1000)
#   Após esse tempo, o usuário precisa fazer login novamente.
# ============================================================
jwt:
  secret: dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySnd0VG9rZW5TaWduaW5nMTIzNDU2Nzg5MA==
  expiration: 86400000
